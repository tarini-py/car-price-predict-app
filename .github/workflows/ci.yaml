name: Flask Code Quality and Testing Pipeline

description: >
  Automated Continuous Integration pipeline for the Flask application. 
  This workflow handles static code analysis (Pylint) and executes the unit 
  test suite (Pytest). It triggers on pushes and pull requests across all branches.

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - '**.md'          # Ignores README.md and all other markdown files
      - '.gitignore'     # Ignores git configurations
      - '.pylintrc'
      - 'docs/**'        # Ignores an entire documentation folder if you have one
      - 'notebooks/**'
      - 'scripts/**'
      - 'data/**'
      
  pull_request:
    branches:
      - '**'
    paths-ignore:
      - '**.md'          # Ignores README.md and all other markdown files
      - '.gitignore'     # Ignores git configurations
      - '.pylintrc'
      - 'docs/**'        # Ignores an entire documentation folder if you have one
      - 'notebooks/**'
      - 'scripts/**'
      - 'data/**'

# 1. DEFINE YOUR PYTHON VERSION HERE ONCE 
env:
  PYTHON_VERSION: '3.13'

jobs:
  # Job 1: Static Code Analysis
  lint:
    name: Code Quality Check (Pylint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Reusing the global variable here
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies & Pylint
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then 
            pip install -r requirements-dev.txt
          else 
            pip install -r requirements.txt pylint pytest
          fi

      - name: Analysing the code with Pylint
        run: PYTHONPATH=. pylint apps/ tests/ scripts/

  # Job 2: Unit Testing
  test:
    name: Run Unit Tests (Pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 3. Reusing the global variable here as well
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies & Pytest
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then 
            pip install -r requirements-dev.txt
          else 
            pip install -r requirements.txt pylint pytest
          fi

      - name: Run tests with Pytest
        run: PYTHONPATH=. pytest