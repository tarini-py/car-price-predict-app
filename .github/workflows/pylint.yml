name: Pylint

on: [push, pull_request] # Added pull_request so it checks code before merging

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5 # Upgraded to v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pylint

    - name: Analysing the code with pylint
      run: |
        # PYTHONPATH=. ensures Pylint can resolve your 'apps' and 'tests' imports
        # We explicitly lint the apps and tests folders
        PYTHONPATH=. pylint apps/ tests/